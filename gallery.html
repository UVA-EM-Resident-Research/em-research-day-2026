};

const formatLabels = {
  "podium": "🎤 Podium",
  "poster-lightning": "📋 Poster",
  "saem-gallery": "🖼️ SAEM Gallery",
  "saem-dryrun": "🎯 Dry-Run",
};

function renderCards(filter) {
  const grid = document.getElementById('galleryGrid');
  let filtered = projects;

  if (filter !== 'all') {
    const [key, val] = filter.split(':');
    if (key === 'format') {
      if (val === 'pgy3') {
        filtered = projects.filter(p => p.type === 'pgy3' && p.format === 'podium');
      } else {
        filtered = projects.filter(p => p.format === val);
      }
    }
  }

  document.getElementById('countDisplay').textContent =
    `Showing ${filtered.length} of ${projects.length} projects`;

  grid.innerHTML = filtered.map(p => {
    const m = methodMeta[p.methodology] || {label: p.methodology, color:'#6b7280', bg:'#f3f4f6'};
    const fmtLabel = formatLabels[p.format] || p.format;

    let roleTags = '';
    if (p.type === 'pgy3') roleTags += '<span class="tag tag-pgy3">PGY-3</span>';
    if (p.type === 'saem' || p.format === 'saem-gallery' || p.format === 'saem-dryrun') roleTags += '<span class="tag tag-saem">SAEM</span>';
    if (p.type === 'dryrun') roleTags += '<span class="tag tag-saem">SAEM</span>';

    return `
      <a href="abstracts/${p.slug}.html" class="gallery-card">
        <div class="card-method" style="color:${m.color}">${m.label}</div>
        <h3>${p.title}</h3>
        <div class="card-author">${p.name} · ${fmtLabel}</div>
        <div class="card-tags">${roleTags}</div>
      </a>
    `;
  }).join('');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter);
  });
});
