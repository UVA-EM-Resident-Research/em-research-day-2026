name: Deploy to GitHub Pages

# Deploys the static site on every push to main, plus manual runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes supersede older in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root — everything is static, no build step.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
